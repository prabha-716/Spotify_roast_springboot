<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Saved Tracks</title>

    <style>

        body{
            font-family: Arial;
            background:#121212;
            color:white;
        }

        .container{
            width:800px;
            margin:auto;
        }

        .track{
            display:flex;
            align-items:center;
            background:#1DB954;
            margin:10px;
            padding:10px;
            border-radius:10px;
        }

        .track img{
            width:80px;
            height:80px;
            margin-right:20px;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Your Saved Tracks</h1>

    <div th:each="item : ${tracks}" class="track">

        <img th:src="${item.track.album.images[0].url}" />

        <div>

            <h3 th:text="${item.track.name}"></h3>

            <p th:text="${item.track.artists[0].name}"></p>

        </div>

    </div>

</div>

</body>

</html>
